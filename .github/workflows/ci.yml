name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint & format check
        run: |
          uv run ruff check src/backend src/vrptw main.py tests/ docs/scripts/smoke_hardening.py
          uv run ruff format --check src/backend src/vrptw main.py tests/ docs/scripts/smoke_hardening.py

      - name: Compile backend modules
        run: |
          uv run python -m compileall src/backend main.py

      - name: Smoke import (security helpers)
        env:
          PYTHONPATH: src/backend
        run: |
          uv run python - <<'PY'
          from core.security import hash_password, verify_password, needs_upgrade

          h = hash_password('hunter2')
          assert verify_password('hunter2', h)
          assert not verify_password('nope', h)
          assert not needs_upgrade(h)

          legacy = '0' * 64
          assert needs_upgrade(legacy)
          print('security helpers OK')
          PY

      - name: Smoke (rate limit + config + builtin demo)
        run: |
          uv run python docs/scripts/smoke_hardening.py

  frontend:
    name: Frontend syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse ES modules with esbuild
        run: |
          npx --yes esbuild@0.24 \
            src/frontend/js/App.js \
            src/frontend/js/landing.js \
            src/frontend/js/main.js \
            src/frontend/js/createInitialState.js \
            src/frontend/js/constants.js \
            src/frontend/js/firebaseConfig.js \
            src/frontend/js/firebaseService.js \
            --format=esm \
            --target=es2022 \
            --bundle=false \
            --log-level=warning \
            --outdir=/tmp/esbuild-check \
            --allow-overwrite

      - name: Parse classic scripts with esbuild
        run: |
          npx --yes esbuild@0.24 \
            src/frontend/js/observability.js \
            --format=iife \
            --target=es2022 \
            --bundle=false \
            --log-level=warning \
            --outdir=/tmp/esbuild-iife \
            --allow-overwrite

  e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (required for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies & Build Frontend
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Install Playwright browsers and dependencies
        run: uv run playwright install --with-deps chromium

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload screenshots & videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            tests/e2e/screenshots/
            tests/e2e/videos/
          if-no-files-found: ignore
