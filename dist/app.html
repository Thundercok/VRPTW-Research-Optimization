<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VRPTW | Ops Control Tower</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?v=force" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js?v=force"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 900: '#0f172a', 600: '#2563eb', 500: '#3b82f6' }, // Corporate Slates & Blues
            status: { safe: '#10b981', warn: '#f59e0b', danger: '#ef4444' } // Strict Semantic Colors
          }
        }
      }
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"
      }
    }
  </script>
</head>

<body class="h-screen w-screen overflow-hidden bg-slate-50 text-slate-800 flex flex-col font-sans">

  <header class="h-16 bg-brand-900 text-white flex items-center justify-between px-6 shadow-md z-20 shrink-0">
    <div class="flex items-center gap-4">
      <h1 class="text-xl font-bold tracking-tight">VRPTW <span class="font-light text-slate-400">Control Tower</span>
      </h1>
      <span id="connection-status"
        class="px-2 py-1 text-xs font-semibold bg-status-safe/20 text-status-safe rounded-full border border-status-safe/30">Live
        (Firebase)</span>
    </div>

    <div class="hidden md:flex gap-8 items-center text-sm">
      <div class="flex flex-col items-center"><span class="text-slate-400 text-xs">Total Orders</span><strong
          id="kpi-orders" class="text-lg">142</strong></div>
      <div class="flex flex-col items-center"><span class="text-slate-400 text-xs">Active Fleet</span><strong
          id="kpi-fleet" class="text-lg">18/24</strong></div>
      <div class="flex flex-col items-center"><span class="text-slate-400 text-xs">SLA Breaches</span><strong
          id="kpi-breaches" class="text-lg text-status-danger">2</strong></div>
    </div>

    <div class="flex gap-4 items-center">
      <button id="btn-open-config"
        class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 text-sm font-semibold rounded shadow transition-colors">
        + New Routing Plan
      </button>
      <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs" title="Operator Profile">
        OP</div>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden relative">

    <aside class="w-80 bg-white border-r border-slate-200 shadow-xl z-10 flex flex-col shrink-0">
      <div class="p-4 border-b border-slate-100 bg-slate-50/50">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Exception Queue</h2>
      </div>

      <div id="fleet-list" class="flex-1 overflow-y-auto p-2 space-y-1">

        <button
          class="w-full text-left p-3 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all group flex items-start gap-3">
          <div class="w-3 h-3 rounded-full bg-status-danger mt-1.5 shrink-0 shadow-[0_0_8px_rgba(239,68,68,0.6)]"></div>
          <div>
            <h3 class="text-sm font-semibold text-slate-900 group-hover:text-brand-600">Vehicle 04 <span
                class="text-xs font-normal text-slate-500 ml-1">#ALNS-92</span></h3>
            <p class="text-xs text-slate-600 mt-0.5">SLA Breach Warning: Cust_12 window closes in 14m.</p>
          </div>
        </button>

        <button
          class="w-full text-left p-3 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all group flex items-start gap-3">
          <div class="w-3 h-3 rounded-full bg-status-safe mt-1.5 shrink-0"></div>
          <div>
            <h3 class="text-sm font-semibold text-slate-900 group-hover:text-brand-600">Vehicle 01 <span
                class="text-xs font-normal text-slate-500 ml-1">#ALNS-92</span></h3>
            <p class="text-xs text-slate-600 mt-0.5">On route to Cust_03. ETA 10:45 AM.</p>
          </div>
        </button>

      </div>
    </aside>

    <section class="flex-1 relative bg-slate-100">
      <div id="map-core" class="absolute inset-0 z-0"></div>
    </section>

  </main>

  <div id="config-modal"
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh]">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center">
        <h2 class="text-xl font-bold text-slate-800">Configure Routing Simulation</h2>
        <button id="btn-close-config" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
      </div>

      <div class="p-6 overflow-y-auto space-y-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Solomon Instance</label>
          <select
            class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
            <option value="demo">Demo (12 customers, HCMC)</option>
            <option value="r101">R101 (100 customers)</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Fleet Size: <span id="val-vehicles"
                class="text-brand-600">4</span></label>
            <input type="range" min="1" max="30" value="4" class="w-full accent-brand-600" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Capacity: <span id="val-capacity"
                class="text-brand-600">120</span></label>
            <input type="range" min="10" max="1000" step="10" value="120" class="w-full accent-brand-600" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Custom Import (CSV/Excel)</label>
          <div
            class="border-2 border-dashed border-slate-300 rounded-lg p-8 text-center hover:bg-slate-50 hover:border-brand-500 transition-colors cursor-pointer">
            <p class="text-sm text-slate-600 font-medium">Drag and drop file here, or click to browse</p>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 bg-slate-50 rounded-b-xl flex justify-end gap-3">
        <button id="btn-cancel-config"
          class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800">Cancel</button>
        <button id="btn-run-model"
          class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2 text-sm font-bold rounded shadow">Run
          Optimization</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
